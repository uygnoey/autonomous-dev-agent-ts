name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: darwin-arm64
            bun-target: bun-darwin-arm64
          - os: macos-13
            target: darwin-x64
            bun-target: bun-darwin-x64
          - os: ubuntu-latest
            target: linux-x64
            bun-target: bun-linux-x64
          - os: ubuntu-24.04-arm
            target: linux-arm64
            bun-target: bun-linux-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build binary
        run: |
          bun build src/index.ts \
            --outfile dist/adev-${{ matrix.target }} \
            --compile \
            --target ${{ matrix.bun-target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: adev-${{ matrix.target }}
          path: dist/adev-${{ matrix.target }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
