name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: darwin-arm64
            bun-target: bun-darwin-arm64
          - os: ubuntu-latest
            target: linux-x64
            bun-target: bun-linux-x64
          - os: ubuntu-latest
            target: linux-arm64
            bun-target: bun-linux-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build binary
        run: |
          bun build src/index.ts \
            --outfile dist/adev-${{ matrix.target }} \
            --compile \
            --target ${{ matrix.bun-target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: adev-${{ matrix.target }}
          path: dist/adev-${{ matrix.target }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: always() && !cancelled()
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare release files
        run: |
          mkdir -p dist/
          find artifacts/ -type f -name 'adev-*' -exec cp {} dist/ \;
          ls -la dist/

      - name: Parse version info
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          if [[ "$TAG" == *"-alpha" ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
            echo "stage=Alpha" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == *"-beta" ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
            echo "stage=Beta" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == *"-pre" ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
            echo "stage=Pre-release" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
            echo "stage=Release" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ steps.version.outputs.prerelease }}
          files: |
            dist/adev-darwin-arm64
            dist/adev-linux-x64
            dist/adev-linux-arm64
          body: |
            ## adev ${{ steps.version.outputs.tag }} (${{ steps.version.outputs.stage }})

            Claude Code Skills + RAG를 연동해 일관된 코드 품질로 자율 개발을 수행하는 에이전트 시스템.

            ---

            ## 설치 / Install

            ```bash
            curl -fsSL https://raw.githubusercontent.com/uygnoey/autonomous-dev-agent-ts/main/install.sh | bash
            ```

            ## 수동 설치 / Manual Install

            플랫폼에 맞는 바이너리를 다운로드 후:

            | 플랫폼 | 파일 |
            |--------|------|
            | macOS (Apple Silicon) | `adev-darwin-arm64` |
            | Linux (x86_64) | `adev-linux-x64` |
            | Linux (ARM64) | `adev-linux-arm64` |

            ```bash
            chmod +x adev-<platform>
            mv adev-<platform> /usr/local/bin/adev
            ```

            ## 시작하기 / Getting Started

            ```bash
            adev auth        # 인증 설정 (API Key 또는 OAuth Token)
            adev init        # 새 프로젝트 초기화
            adev start       # Layer1 대화 시작
            ```

            ## 변경사항 / Changelog

            - `adev auth` 커맨드 추가 — 인증 설정/재설정/상태확인
            - `adev setting` 추가 — `adev config` 별칭
            - 바이너리 직접 배포로 전환 (git clone 불필요)
            - 설치 시 대화형 인증 설정 (`exec </dev/tty` 적용)
            - projects.json 테스트 격리 수정
            - layer2 V2SessionExecutor DI 패턴 적용
            - yargs version 예약어 충돌 수정

